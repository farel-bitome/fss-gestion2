name: Build FSS-GESTION.exe

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Recuperer les fichiers
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Installer les dependances
        run: npm install

      - name: Construire le .exe
        run: npm run dist

      - name: Publier le .exe construit
        uses: actions/upload-artifact@v4
        with:
          name: FSS-GESTION-exe
          path: dist/*.exe
